<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pool Pulse · World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch:#0E3B2E;        /* deep pitch green */
    --pitch-line:#1C5C45;   /* lighter pitch stripe */
    --chalk:#F2F5F0;        /* chalk white */
    --board:#131310;        /* scoreboard black */
    --amber:#FFB627;        /* scoreboard amber */
    --amber-dim:#8a6a25;
    --red:#E4572E;
    --ink:#10241D;
    --muted:#7FA294;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--pitch);color:var(--chalk);font-family:'Barlow Condensed',Arial,sans-serif;}
  body{
    background-image:repeating-linear-gradient(90deg, var(--pitch) 0 120px, var(--pitch-line) 120px 240px);
    background-attachment:fixed;
    min-height:100vh;
  }
  .wrap{max-width:1100px;margin:0 auto;padding:28px 18px 80px;}

  /* ---------- header ---------- */
  header{margin-bottom:26px;}
  .kick{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  h1{
    font-family:'Archivo Black',sans-serif;
    font-size:clamp(34px,7vw,64px);
    letter-spacing:.5px;line-height:.95;
    color:var(--chalk);
    text-shadow:4px 4px 0 rgba(0,0,0,.35);
  }
  h1 .amber{color:var(--amber)}
  .sub{font-size:18px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}

  /* ---------- tabs ---------- */
  nav{display:flex;gap:8px;margin:22px 0 26px;flex-wrap:wrap}
  nav button{
    font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:2px;
    text-transform:uppercase;color:var(--chalk);background:rgba(0,0,0,.25);
    border:2px solid rgba(242,245,240,.25);padding:10px 22px;cursor:pointer;border-radius:3px;
    transition:all .15s;
  }
  nav button:hover{border-color:var(--amber)}
  nav button.on{background:var(--amber);color:var(--board);border-color:var(--amber)}
  nav button:focus-visible{outline:3px solid var(--amber);outline-offset:2px}

  /* ---------- scoreboard chip (signature) ---------- */
  .flap{
    display:inline-flex;align-items:center;gap:3px;
    font-family:'IBM Plex Mono',monospace;font-weight:700;
  }
  .flap .d{
    position:relative;background:var(--board);color:var(--amber);
    padding:2px 7px;border-radius:3px;min-width:24px;text-align:center;
    box-shadow:inset 0 -2px 0 rgba(255,255,255,.06), 0 2px 3px rgba(0,0,0,.4);
  }
  .flap .d::after{ /* split-flap seam */
    content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(0,0,0,.7);
  }
  .flap .sep{color:rgba(242,245,240,.6);font-weight:700}

  /* ---------- panels ---------- */
  .panel{display:none}
  .panel.on{display:block;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){ .panel.on{animation:none} }

  .card{
    background:rgba(8,22,17,.78);border:1px solid rgba(242,245,240,.14);
    border-radius:6px;padding:18px;backdrop-filter:blur(2px);
  }

  /* ---------- match list ---------- */
  .matchgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px;margin-bottom:22px}
  .mbtn{
    text-align:left;cursor:pointer;border:1px solid rgba(242,245,240,.18);
    background:rgba(8,22,17,.7);color:var(--chalk);padding:10px 12px;border-radius:5px;
    font-family:'Barlow Condensed',sans-serif;transition:all .12s;
  }
  .mbtn:hover{border-color:var(--amber);transform:translateY(-1px)}
  .mbtn.on{border-color:var(--amber);background:rgba(255,182,39,.12)}
  .mbtn .teams{font-weight:700;font-size:19px;letter-spacing:1px}
  .mbtn .mini{display:flex;height:5px;border-radius:3px;overflow:hidden;margin-top:8px;background:rgba(255,255,255,.08)}
  .mbtn .mini i{display:block;height:100%}
  .mbtn .lean{font-size:13px;color:var(--muted);margin-top:5px;letter-spacing:1px;text-transform:uppercase;font-weight:600}

  /* ---------- match detail ---------- */
  .mhead{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  .mhead .big{font-family:'Archivo Black',sans-serif;font-size:clamp(22px,4.5vw,34px)}
  .splitbar{display:flex;height:38px;border-radius:4px;overflow:hidden;border:1px solid rgba(0,0,0,.4);margin:10px 0 6px}
  .splitbar div{display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;letter-spacing:1px;color:var(--board);white-space:nowrap;overflow:hidden}
  .seg-h{background:var(--amber)} .seg-d{background:#cfd8d2} .seg-a{background:#7ec8a9}
  .legend{display:flex;gap:18px;font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:18px;flex-wrap:wrap}
  .legend b{color:var(--chalk)}

  .seclabel{font-size:14px;letter-spacing:2.5px;text-transform:uppercase;color:var(--amber);font-weight:700;margin:18px 0 10px;border-bottom:1px dashed rgba(255,182,39,.35);padding-bottom:6px}

  .scorefreq{display:flex;flex-wrap:wrap;gap:10px}
  .sf{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.25);border:1px solid rgba(242,245,240,.12);padding:7px 10px;border-radius:5px}
  .sf .n{font-weight:700;font-size:16px;color:var(--muted)}
  .sf.top{border-color:var(--amber)}
  .sf.lone{border-style:dashed;border-color:rgba(228,87,46,.7)}
  .sf.lone .n{color:var(--red)}

  table{width:100%;border-collapse:collapse;font-size:17px}
  th{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:left;padding:6px 8px;border-bottom:1px solid rgba(242,245,240,.18)}
  td{padding:7px 8px;border-bottom:1px solid rgba(242,245,240,.07)}
  tr:hover td{background:rgba(255,255,255,.04)}
  .tag{display:inline-block;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:3px;margin-left:8px}
  .tag.herd{background:rgba(255,182,39,.18);color:var(--amber)}
  .tag.lone{background:rgba(228,87,46,.18);color:#ff8a66}

  /* ---------- players ---------- */
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:22px}
  .pbtn{cursor:pointer;text-align:left;border:1px solid rgba(242,245,240,.18);background:rgba(8,22,17,.7);
    color:var(--chalk);padding:9px 12px;border-radius:5px;font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:17px;transition:all .12s;display:flex;justify-content:space-between;gap:8px;align-items:center}
  .pbtn:hover{border-color:var(--amber)}
  .pbtn.on{border-color:var(--amber);background:rgba(255,182,39,.12)}
  .pbtn small{color:var(--muted);font-size:13px;letter-spacing:1px}
  .statrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:8px}
  .stat{background:rgba(0,0,0,.28);border:1px solid rgba(242,245,240,.12);border-radius:5px;padding:12px 14px}
  .stat .v{font-family:'Archivo Black',sans-serif;font-size:30px;color:var(--amber)}
  .stat .k{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:2px}
  .agree{color:var(--amber);font-weight:700}
  .differ{color:#ff8a66;font-weight:700}

  /* ---------- superlatives ---------- */
  .supergrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:14px}
  .super{background:rgba(8,22,17,.82);border:1px solid rgba(242,245,240,.14);border-left:5px solid var(--amber);
    border-radius:5px;padding:16px 16px 14px}
  .super .award{font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:var(--amber);font-weight:700}
  .super .who{font-family:'Archivo Black',sans-serif;font-size:21px;margin:7px 0 4px;line-height:1.1}
  .super .why{font-size:16px;color:#b8cfc5;line-height:1.35}

  footer{margin-top:40px;text-align:center;font-size:14px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kick">
      <h1>POOL <span class="amber">PULSE</span></h1>
      <span class="flap" style="font-size:22px"><span class="d">2</span><span class="d">6</span></span>
    </div>
    <div class="sub" id="subline">World Cup 2026 · group stage picks</div>
  </header>

  <nav>
    <button class="on" data-tab="matches">Matches</button>
    <button data-tab="players">Players</button>
    <button data-tab="superlatives">Superlatives</button>
  </nav>

  <section id="matches" class="panel on">
    <div class="matchgrid" id="matchgrid"></div>
    <div class="card" id="matchdetail"></div>
  </section>

  <section id="players" class="panel">
    <div class="pgrid" id="pgrid"></div>
    <div class="card" id="pdetail"></div>
  </section>

  <section id="superlatives" class="panel">
    <div class="supergrid" id="supergrid"></div>
  </section>

  <footer>built for the pool · talk your trash responsibly</footer>
</div>

<script>
/* ================= DATA ================= */
const PLAYERS = [

"USA Rules!!! Or Spain…","I Am From Bosnia, Take Me To America","EddieYates","Escargot go France!",
"BandosBrew","Soccer or Football","Uzbeckhamstan","Insane Kane salt & vinegoallllll",
"All In! Autumn Wind","bedstuy ball knowers","WESPN","Paul the Octopus",

const FLAG = {MEX:"🇲🇽",RSA:"🇿🇦",KOR:"🇰🇷",CZE:"🇨🇿",CAN:"🇨🇦",BIH:"🇧🇦",USA:"🇺🇸",PAR:"🇵🇾",QAT:"🇶🇦",SUI:"🇨🇭",
BRA:"🇧🇷",MAR:"🇲🇦",HAI:"🇭🇹",SCO:"🏴󠁧󠁢󠁳󠁣󠁴󠁿",AUS:"🇦🇺",TUR:"🇹🇷",GER:"🇩🇪",CUW:"🇨🇼",NED:"🇳🇱",JPN:"🇯🇵",
CIV:"🇨🇮",ECU:"🇪🇨",ESP:"🇪🇸",CPV:"🇨🇻",BEL:"🇧🇪",EGY:"🇪🇬",SWE:"🇸🇪",TUN:"🇹🇳",KSA:"🇸🇦",URU:"🇺🇾",
IRN:"🇮🇷",NZL:"🇳🇿",FRA:"🇫🇷",SEN:"🇸🇳",IRQ:"🇮🇶",NOR:"🇳🇴",ARG:"🇦🇷",ALG:"🇩🇿",AUT:"🇦🇹",JOR:"🇯🇴",
POR:"🇵🇹",COD:"🇨🇩",ENG:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",CRO:"🇭🇷",GHA:"🇬🇭",PAN:"🇵🇦",UZB:"🇺🇿",COL:"🇨🇴"};

/* picks[i] = [home,away] for PLAYERS[i] */
const MATCHES = [
{h:"MEX",a:"RSA",p:[[3,1],[2,0],[3,0],[3,0],[3,1],[2,1],[2,0],[2,0],[2,1],[1,1],[2,1],[2,1],[2,0],[1,0],[2,0],[2,0],[3,1],[2,0],[2,0],[2,0],[2,1],[2,0],[3,0],[3,0]]},
{h:"KOR",a:"CZE",p:[[1,1],[2,1],[2,1],[2,1],[1,1],[1,0],[1,1],[1,1],[1,1],[2,1],[1,0],[0,1],[1,1],[2,1],[1,0],[2,1],[1,2],[1,1],[2,1],[1,1],[1,1],[1,1],[3,1],[2,3]]},
{h:"CAN",a:"BIH",p:[[2,1],[1,0],[2,1],[0,1],[2,1],[0,1],[3,0],[2,1],[2,0],[2,1],[1,1],[0,1],[1,1],[0,0],[2,0],[2,0],[2,0],[2,1],[2,0],[2,1],[1,1],[2,0],[3,1],[1,2]]},
{h:"USA",a:"PAR",p:[[1,0],[1,0],[1,3],[0,2],[2,1],[2,1],[2,1],[2,0],[1,1],[2,2],[2,0],[2,1],[2,1],[1,2],[2,1],[2,1],[2,1],[3,1],[2,1],[2,1],[2,1],[1,1],[1,0],[2,3]]},
{h:"QAT",a:"SUI",p:[[1,3],[0,2],[2,1],[0,3],[0,2],[0,1],[0,2],[1,1],[0,2],[0,4],[0,0],[0,2],[0,2],[0,1],[0,3],[0,2],[1,2],[0,2],[1,3],[0,3],[0,2],[1,2],[1,3],[0,3]]},
{h:"BRA",a:"MAR",p:[[2,1],[2,0],[3,1],[1,1],[2,1],[2,2],[3,1],[0,1],[2,2],[1,1],[1,0],[3,1],[3,1],[1,1],[2,1],[3,0],[4,0],[3,1],[3,2],[0,0],[2,1],[3,1],[1,0],[3,2]]},
{h:"HAI",a:"SCO",p:[[1,2],[0,2],[0,1],[1,2],[1,1],[0,1],[0,2],[1,2],[0,2],[0,3],[1,4],[0,1],[1,2],[1,3],[0,3],[1,2],[2,3],[0,0],[1,2],[0,3],[0,3],[0,2],[0,2],[1,3]]},
{h:"AUS",a:"TUR",p:[[0,3],[0,2],[2,2],[1,3],[1,2],[0,2],[2,2],[1,1],[1,2],[1,3],[1,2],[2,2],[1,1],[0,1],[0,3],[0,3],[1,2],[1,2],[1,3],[1,1],[0,2],[1,2],[1,1],[1,4]]},
{h:"GER",a:"CUW",p:[[4,0],[4,0],[2,1],[6,0],[3,0],[4,0],[4,0],[5,0],[3,0],[4,1],[6,0],[4,0],[4,0],[2,0],[4,0],[3,1],[3,0],[3,0],[5,0],[4,0],[3,0],[4,0],[4,0],[4,0]]},
{h:"NED",a:"JPN",p:[[3,1],[2,1],[2,1],[2,1],[2,0],[2,1],[1,0],[2,1],[2,0],[2,1],[2,2],[1,1],[2,1],[2,2],[2,2],[1,1],[2,1],[2,0],[2,1],[2,1],[1,1],[2,1],[2,2],[2,3]]},
{h:"CIV",a:"ECU",p:[[0,4],[1,1],[1,3],[1,1],[1,1],[0,1],[1,1],[0,1],[1,2],[1,2],[1,0],[0,0],[1,1],[1,2],[2,2],[1,0],[2,2],[0,0],[1,3],[1,2],[1,1],[1,1],[1,1],[3,2]]},
{h:"ESP",a:"CPV",p:[[4,0],[4,0],[4,1],[6,0],[4,0],[3,0],[4,0],[5,0],[4,0],[3,0],[1,0],[3,0],[3,0],[3,0],[2,1],[3,0],[3,0],[2,0],[4,0],[4,0],[3,0],[3,0],[4,0],[4,0]]},
{h:"BEL",a:"EGY",p:[[1,1],[2,1],[2,1],[1,1],[1,1],[2,1],[2,0],[2,1],[2,1],[2,1],[2,0],[1,2],[2,0],[2,2],[2,1],[3,0],[2,0],[2,0],[3,1],[1,1],[2,2],[2,2],[0,0],[2,3]]},
{h:"SWE",a:"TUN",p:[[2,1],[1,0],[2,1],[2,1],[2,0],[1,0],[2,0],[2,1],[2,1],[2,0],[0,0],[2,1],[1,0],[2,0],[3,0],[2,0],[2,1],[1,1],[0,0],[2,0],[2,0],[1,1],[1,0],[1,2]]},
{h:"KSA",a:"URU",p:[[1,3],[1,2],[3,4],[0,4],[1,2],[0,2],[2,1],[0,2],[0,2],[0,3],[1,1],[0,1],[0,2],[0,1],[1,3],[0,2],[0,2],[0,4],[0,2],[0,2],[0,2],[1,3],[0,1],[1,2]]},
{h:"IRN",a:"NZL",p:[[2,2],[1,0],[1,1],[1,1],[1,1],[2,0],[1,1],[1,1],[1,1],[3,1],[1,0],[0,0],[1,0],[1,0],[2,0],[1,1],[1,1],[2,2],[1,1],[0,0],[0,2],[2,0],[0,1],[3,1]]},
{h:"FRA",a:"SEN",p:[[3,1],[3,1],[3,0],[2,0],[2,1],[2,0],[2,0],[3,1],[3,1],[3,0],[1,1],[3,1],[2,1],[2,1],[3,0],[3,1],[3,0],[3,1],[3,1],[0,1],[3,1],[3,1],[1,0],[2,2]]},
{h:"IRQ",a:"NOR",p:[[0,2],[0,2],[1,2],[0,3],[1,2],[0,2],[1,2],[0,1],[0,2],[1,3],[1,3],[0,2],[0,2],[0,2],[0,2],[0,3],[0,3],[0,2],[0,2],[0,3],[0,3],[0,2],[2,3],[2,2]]},
{h:"ARG",a:"ALG",p:[[2,0],[2,0],[2,0],[3,1],[2,0],[3,1],[4,1],[1,0],[3,1],[3,1],[1,0],[2,1],[2,0],[1,0],[3,1],[2,0],[3,1],[4,1],[3,0],[2,0],[4,0],[3,1],[2,0],[2,2]]},
{h:"AUT",a:"JOR",p:[[3,1],[2,0],[1,2],[4,0],[1,0],[2,0],[2,0],[3,1],[2,1],[3,1],[1,1],[1,0],[2,0],[2,0],[2,0],[3,0],[2,0],[2,2],[1,0],[1,1],[1,1],[1,0],[0,0],[3,0]]},
{h:"POR",a:"COD",p:[[4,0],[4,0],[1,2],[4,0],[4,0],[3,1],[3,0],[1,1],[4,0],[3,0],[3,0],[3,1],[3,0],[3,1],[2,0],[3,0],[3,1],[3,1],[4,0],[2,0],[3,0],[3,1],[4,0],[5,1]]},
{h:"ENG",a:"CRO",p:[[2,1],[2,1],[3,1],[3,1],[2,1],[3,2],[2,2],[1,1],[1,1],[3,2],[1,1],[1,1],[2,1],[1,0],[3,1],[2,1],[2,0],[1,1],[3,2],[1,0],[2,1],[2,2],[1,1],[2,2]]},
{h:"GHA",a:"PAN",p:[[1,1],[2,1],[2,1],[2,0],[1,1],[1,0],[2,0],[1,2],[2,1],[2,1],[0,0],[0,1],[2,1],[0,0],[1,0],[2,1],[2,2],[2,0],[2,0],[1,2],[2,0],[2,0],[3,0],[3,2]]},
{h:"UZB",a:"COL",p:[[0,3],[0,2],[0,2],[1,3],[0,3],[1,1],[0,2],[1,2],[0,2],[0,3],[0,2],[1,3],[0,2],[0,1],[0,4],[0,2],[0,3],[1,4],[0,1],[1,2],[0,2],[0,2],[0,2],[0,2]]}
];

/* ================= ANALYSIS ================= */
const outc = (h,a)=> h>a ? "H" : h<a ? "A" : "D";
const oname = (m,o)=> o==="H" ? m.h : o==="A" ? m.a : "Draw";

const analysis = MATCHES.map(m=>{
  const counts={H:0,D:0,A:0}, freq={};
  m.p.forEach(([h,a])=>{
    counts[outc(h,a)]++;
    const k=h+"-"+a; freq[k]=(freq[k]||0)+1;
  });
  const max=Math.max(counts.H,counts.D,counts.A);
  const majority=["H","D","A"].filter(o=>counts[o]===max);
  const scores=Object.entries(freq).sort((x,y)=>y[1]-x[1]||x[0].localeCompare(y[0]));
  return {counts,majority,max,freq,scores,topScore:scores[0]};
});

const pstats = PLAYERS.map((name,i)=>{
  let goals=0,draws=0,lone=0,herd=0,modeScore=0,maxScore=0,maxScoreStr="";
  MATCHES.forEach((m,mi)=>{
    const [h,a]=m.p[i], A=analysis[mi];
    goals+=h+a;
    if(h===a)draws++;
    if(A.freq[h+"-"+a]===1)lone++;
    if(A.majority.includes(outc(h,a)))herd++;
    if(h+"-"+a===A.topScore[0])modeScore++;
    if(h+a>maxScore){maxScore=h+a;maxScoreStr=`${h}-${a} in ${m.h}–${m.a}`}
  });
  return {name,i,goals,draws,lone,herd,modeScore,avg:goals/MATCHES.length,maxScoreStr,
          herdPct:Math.round(100*herd/MATCHES.length)};
});

document.getElementById("subline").textContent =
  `World Cup 2026 · ${PLAYERS.length} players · ${MATCHES.length} group-stage picks each`;

/* ================= HELPERS ================= */
const flap=(h,a)=>`<span class="flap"><span class="d">${h}</span><span class="sep">–</span><span class="d">${a}</span></span>`;
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;");

/* ================= TABS ================= */
document.querySelectorAll("nav button").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll("nav button").forEach(x=>x.classList.remove("on"));
    document.querySelectorAll(".panel").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    document.getElementById(b.dataset.tab).classList.add("on");
  });
});

/* ================= MATCHES TAB ================= */
const mg=document.getElementById("matchgrid");
MATCHES.forEach((m,i)=>{
  const A=analysis[i], n=PLAYERS.length;
  const lead=A.majority.length>1 ? "split pool" : oname(m,A.majority[0])+" "+Math.round(100*A.max/n)+"%";
  const btn=document.createElement("button");
  btn.className="mbtn"; btn.dataset.i=i;
  btn.innerHTML=`<div class="teams">${FLAG[m.h]} ${m.h} – ${m.a} ${FLAG[m.a]}</div>
    <div class="mini">
      <i class="seg-h" style="width:${100*A.counts.H/n}%"></i>
      <i class="seg-d" style="width:${100*A.counts.D/n}%"></i>
      <i class="seg-a" style="width:${100*A.counts.A/n}%"></i>
    </div>
    <div class="lean">${lead}</div>`;
  btn.addEventListener("click",()=>showMatch(i));
  mg.appendChild(btn);
});

function showMatch(i){
  document.querySelectorAll(".mbtn").forEach(b=>b.classList.toggle("on",+b.dataset.i===i));
  const m=MATCHES[i], A=analysis[i], n=PLAYERS.length;
  const pct=o=>Math.round(100*A.counts[o]/n);
  const seg=(o,cls,label)=>A.counts[o]?`<div class="${cls}" style="width:${100*A.counts[o]/n}%" title="${label}">${A.counts[o]>=3?label+" "+pct(o)+"%":""}</div>`:"";

  const chips=A.scores.map(([k,c])=>{
    const [h,a]=k.split("-");
    const cls = c===A.topScore[1] ? "sf top" : c===1 ? "sf lone" : "sf";
    return `<div class="${cls}">${flap(h,a)}<span class="n">×${c}</span></div>`;
  }).join("");

  const rows=PLAYERS.map((p,pi)=>{
    const [h,a]=m.p[pi], k=h+"-"+a;
    const isTop = k===A.topScore[0] && A.topScore[1]>1;
    const isLone = A.freq[k]===1;
    return {p,h,a,k,c:A.freq[k],isTop,isLone};
  }).sort((x,y)=>y.c-x.c||x.k.localeCompare(y.k)||x.p.localeCompare(y.p))
    .map(r=>`<tr><td>${esc(r.p)}${r.isTop?'<span class="tag herd">crowd pick</span>':""}${r.isLone?'<span class="tag lone">lone pick</span>':""}</td>
      <td>${flap(r.h,r.a)}</td><td style="color:var(--muted)">${oname(m,outc(r.h,r.a))}</td></tr>`).join("");

  document.getElementById("matchdetail").innerHTML=`
    <div class="mhead"><span class="big">${FLAG[m.h]} ${m.h} <span style="color:var(--muted)">vs</span> ${m.a} ${FLAG[m.a]}</span></div>
    <div class="splitbar">${seg("H","seg-h",m.h)}${seg("D","seg-d","Draw")}${seg("A","seg-a",m.a)}</div>
    <div class="legend">
      <span><b>${A.counts.H}</b> picked ${m.h}</span>
      <span><b>${A.counts.D}</b> picked a draw</span>
      <span><b>${A.counts.A}</b> picked ${m.a}</span>
    </div>
    <div class="seclabel">Scoreline frequency</div>
    <div class="scorefreq">${chips}</div>
    <div class="seclabel">Everyone's pick</div>
    <table><thead><tr><th>Player</th><th>Pick</th><th>Backing</th></tr></thead><tbody>${rows}</tbody></table>`;
}
showMatch(0);

/* ================= PLAYERS TAB ================= */
const pg=document.getElementById("pgrid");
PLAYERS.forEach((p,i)=>{
  const b=document.createElement("button");
  b.className="pbtn"; b.dataset.i=i;
  b.innerHTML=`<span>${esc(p)}</span><small>${pstats[i].herdPct}% herd</small>`;
  b.addEventListener("click",()=>showPlayer(i));
  pg.appendChild(b);
});

function showPlayer(i){
  document.querySelectorAll(".pbtn").forEach(b=>b.classList.toggle("on",+b.dataset.i===i));
  const s=pstats[i];
  const rows=MATCHES.map((m,mi)=>{
    const [h,a]=m.p[i], A=analysis[mi];
    const my=outc(h,a), agrees=A.majority.includes(my);
    const [tk,tc]=A.topScore, [th,ta]=tk.split("-");
    return `<tr>
      <td>${FLAG[m.h]} ${m.h}–${m.a} ${FLAG[m.a]}</td>
      <td>${flap(h,a)}${A.freq[h+"-"+a]===1?'<span class="tag lone">lone</span>':""}</td>
      <td>${flap(th,ta)} <span style="color:var(--muted);font-size:14px">×${tc}</span></td>
      <td class="${agrees?"agree":"differ"}">${agrees?"with the pool":"against · "+oname(m,my)}</td></tr>`;
  }).join("");

  document.getElementById("pdetail").innerHTML=`
    <div class="mhead"><span class="big">${esc(s.name)}</span></div>
    <div class="statrow">
      <div class="stat"><div class="v">${s.herdPct}%</div><div class="k">herd index</div></div>
      <div class="stat"><div class="v">${s.goals}</div><div class="k">goals predicted</div></div>
      <div class="stat"><div class="v">${s.avg.toFixed(1)}</div><div class="k">goals / match</div></div>
      <div class="stat"><div class="v">${s.draws}</div><div class="k">draws picked</div></div>
      <div class="stat"><div class="v">${s.lone}</div><div class="k">lone-wolf picks</div></div>
    </div>
    <div class="seclabel">Pick by pick vs the pool favorite</div>
    <table><thead><tr><th>Match</th><th>Their pick</th><th>Pool favorite</th><th>Outcome call</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}
showPlayer(0);

/* ================= SUPERLATIVES ================= */
function topBy(fn,dir=1){return [...pstats].sort((a,b)=>dir*(fn(b)-fn(a)))[0];}
const optimist=topBy(s=>s.goals);
const pessimist=topBy(s=>s.goals,-1);
const fence=topBy(s=>s.draws);
const wolf=topBy(s=>s.lone);
const sheep=topBy(s=>s.herd);
const maverick=topBy(s=>s.herd,-1);

/* most popular exact scoreline across all picks */
const allFreq={};
MATCHES.forEach(m=>m.p.forEach(([h,a])=>{const k=h+"-"+a;allFreq[k]=(allFreq[k]||0)+1;}));
const [popScore,popCount]=Object.entries(allFreq).sort((a,b)=>b[1]-a[1])[0];

/* most unanimous + most divided matches by top scoreline share */
let unanimous={c:-1}, divided={c:99};
MATCHES.forEach((m,i)=>{
  const c=analysis[i].topScore[1];
  if(c>unanimous.c)unanimous={m,c,k:analysis[i].topScore[0]};
  if(c<divided.c)divided={m,c,n:analysis[i].scores.length};
});

/* biggest single blowout prediction */
let blow={d:-1};
MATCHES.forEach((m,mi)=>m.p.forEach(([h,a],pi)=>{
  if(h+a>blow.d){blow={d:h+a,h,a,m,p:PLAYERS[pi]}}
}));

const cards=[
 ["The Optimist",optimist.name,`${optimist.goals} total goals predicted (${optimist.avg.toFixed(1)} per match). Expects fireworks everywhere.`],
 ["The 0–0 Energy Award",pessimist.name,`Only ${pessimist.goals} goals predicted (${pessimist.avg.toFixed(1)} per match). Defense wins championships, apparently.`],
 ["The Fence Sitter",fence.name,`Picked ${fence.draws} draws — nobody commits less.`],
 ["The Lone Wolf",wolf.name,`${wolf.lone} picks that literally no one else made. Bold or unhinged, time will tell.`],
 ["Chief of the Herd",sheep.name,`Agreed with the pool's majority outcome in ${sheep.herdPct}% of matches. Zero surprises here.`],
 ["The Maverick",maverick.name,`Lowest herd index in the pool at ${maverick.herdPct}%. Allergic to consensus.`],
 ["Pool's Favorite Scoreline",popScore.replace("-","–"),`Picked ${popCount} times across all matches. The default answer of this pool.`],
 ["Most Unanimous Match",`${unanimous.m.h} vs ${unanimous.m.a}`,`${unanimous.c} of ${PLAYERS.length} players landed on the exact same ${unanimous.k.replace("-","–")}.`],
 ["Most Chaotic Match",`${divided.m.h} vs ${divided.m.a}`,`No scoreline got more than ${divided.c} backers — ${divided.n} different scores predicted.`],
 ["Biggest Blowout Called",blow.p,`Went ${blow.h}–${blow.a} in ${blow.m.h} vs ${blow.m.a}. No mercy.`],
];
document.getElementById("supergrid").innerHTML=cards.map(([a,w,y])=>
 `<div class="super"><div class="award">${a}</div><div class="who">${esc(w)}</div><div class="why">${y}</div></div>`).join("");
</script>
</body>
</html>
