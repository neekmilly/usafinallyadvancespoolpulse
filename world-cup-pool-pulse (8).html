/* ================= SCORING (pool rules) =================
   Per match, max 90: outcome (1X2) = 48, exact home goals = 15,
   exact away goals = 15, exact goal difference = 12. Independent. */
function scorePick(pk,res){
  let pts=0;
  if(outc(pk[0],pk[1])===outc(res.h,res.a))pts+=48;
  if(pk[0]===res.h)pts+=15;
  if(pk[1]===res.a)pts+=15;
  if(pk[0]-pk[1]===res.h-res.a)pts+=12;
  return pts;
}

/* ================= SAFE STORAGE (remembers ranks between visits) ================= */
const store={
  get(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
};
const baselineRanks=store.get("ufa_ranks");

/* ================= LIVE RESULTS =================
   Free open-source feed (no key): https://worldcup26.ir/get/games
   MANUAL_RESULTS is a fallback/override: add entries like
   {h:"MEX",a:"RSA",hs:2,as:0,final:true} and they take precedence. */
const API="https://worldcup26.ir/get/games";
const MANUAL_RESULTS=[
  {h:"MEX",a:"RSA",hs:2,as:0,final:true}, // June 11 — Quiñones, Jiménez
];
const FINAL_WORDS=["completed","finished","ft","full","ended","final"];
const LIVE_WORDS=["live","progress","playing","1h","2h","ht","half"];
let RESULTS={}, feedStatus="loading", lastUpdated=null;

const keyOf=(h,a)=>h+"|"+a;
function applyManual(){MANUAL_RESULTS.forEach(r=>{RESULTS[keyOf(r.h,r.a)]={h:r.hs,a:r.as,final:r.final!==false,live:!!r.live};});}
function resultFor(m){
  const r=RESULTS[keyOf(m.h,m.a)];
  if(r)return r;
  const f=RESULTS[keyOf(m.a,m.h)];
  return f?{h:f.a,a:f.h,final:f.final,live:f.live}:null;
}
async function fetchResults(){
  try{
    const resp=await fetch(API,{cache:"no-store"});
    if(!resp.ok)throw new Error("http "+resp.status);
    const data=await resp.json();
    const games=Array.isArray(data)?data:(data.games||data.matches||data.data||[]);
    const next={};
    games.forEach(g=>{
      const hc=(g.homeTeam&&(g.homeTeam.code||g.homeTeam.fifaCode))||g.home_code||g.homeCode;
      const ac=(g.awayTeam&&(g.awayTeam.code||g.awayTeam.fifaCode))||g.away_code||g.awayCode;
      const hs=g.homeScore!=null?g.homeScore:g.home_score;
      const as=g.awayScore!=null?g.awayScore:g.away_score;
      const st=String(g.status||"").toLowerCase();
      const isFinal=FINAL_WORDS.some(w=>st.includes(w));
      const isLive=!isFinal&&LIVE_WORDS.some(w=>st.includes(w));
      if(!hc||!ac||(!isFinal&&!isLive))return;
      if(typeof hs!=="number"||typeof as!=="number")return;
      next[keyOf(hc,ac)]={h:hs,a:as,final:isFinal,live:isLive};
    });
    RESULTS=next; applyManual();
    feedStatus="ok"; lastUpdated=new Date();
  }catch(e){
    RESULTS={}; applyManual();
    feedStatus=MANUAL_RESULTS.length?"manual":"error";
  }
  refreshAll();
}

/* ================= ANALYSIS ================= */
const outc = (h,a)=> h>a ? "H" : h<a ? "A" : "D";
const oname = (m,o)=> o==="H" ? m.h : o==="A" ? m.a : "Draw";

const analysis = MATCHES.map(m=>{
  const counts={H:0,D:0,A:0}, freq={};
  let n=0;
  m.p.forEach(pk=>{
    if(!pk) return;
    n++;
    const [h,a]=pk;
    counts[outc(h,a)]++;
    const k=h+"-"+a; freq[k]=(freq[k]||0)+1;
  });
  const max=Math.max(counts.H,counts.D,counts.A);
  const majority=["H","D","A"].filter(o=>counts[o]===max);
  const scores=Object.entries(freq).sort((x,y)=>y[1]-x[1]||x[0].localeCompare(y[0]));
  return {counts,majority,max,freq,scores,topScore:scores[0],n};
});

const pstats = PLAYERS.map((name,i)=>{
  let goals=0,draws=0,lone=0,herd=0,played=0,missed=0;
  MATCHES.forEach((m,mi)=>{
    const pk=m.p[i];
    if(!pk){missed++;return;}
    played++;
    const [h,a]=pk, A=analysis[mi];
    goals+=h+a;
    if(h===a)draws++;
    if(A.freq[h+"-"+a]===1)lone++;
    if(A.majority.includes(outc(h,a)))herd++;
  });
  return {name,i,goals,draws,lone,herd,played,missed,avg:goals/played,
          herdPct:Math.round(100*herd/played)};
});

const MDS=[...new Set(MATCHES.map(m=>m.md))];
document.getElementById("subline").textContent =
  `World Cup 2026 · ${PLAYERS.length} players · ${MATCHES.length} matches picked · max 90 pts per match`;

/* ================= HELPERS ================= */
const flap=(h,a)=>`<span class="flap"><span class="d">${h}</span><span class="sep">–</span><span class="d">${a}</span></span>`;
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;");

/* hot & cold streaks: avg points over the last 5 matches with results */
let STREAK={};
function updateStreaks(counted){
  STREAK={};
  if(counted<3)return;
  const resulted=MATCHES.map(m=>({m,res:resultFor(m)})).filter(x=>x.res).slice(-5);
  PLAYERS.forEach((name,i)=>{
    let s=0,c=0;
    resulted.forEach(({m,res})=>{const pk=m.p[i];if(pk)s+=scorePick(pk,res);c++;});
    if(!c)return;
    const avg=s/c;
    if(avg>=55)STREAK[name]="🔥";
    else if(avg<25)STREAK[name]="🧊";
  });
}
const deco=n=>esc(n)+(STREAK[n]?" "+STREAK[n]:"");

/* ================= TABS ================= */
document.querySelectorAll("nav button").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll("nav button").forEach(x=>x.classList.remove("on"));
    document.querySelectorAll(".panel").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    document.getElementById(b.dataset.tab).classList.add("on");
  });
});

/* ================= LEADERBOARD ================= */
function computeBoard(){
  let counted=0, anyLive=false;
  MATCHES.forEach(m=>{const r=resultFor(m); if(r){counted++; if(r.live)anyLive=true;}});
  const rows=PLAYERS.map((name,i)=>{
    let pts=0,perfect=0,livePts=0;
    MATCHES.forEach(m=>{
      const res=resultFor(m); if(!res)return;
      const pk=m.p[i]; if(!pk)return;
      const p=scorePick(pk,res);
      pts+=p; if(p===90&&res.final)perfect++; if(res.live)livePts+=p;
    });
    return {name,i,pts,perfect,livePts};
  }).sort((a,b)=>b.pts-a.pts||b.perfect-a.perfect||a.name.localeCompare(b.name));
  return {rows,counted,anyLive};
}

function rankMap(rows){
  const map={};let rank=0,prev=null;
  rows.forEach((r,idx)=>{if(r.pts!==prev){rank=idx+1;prev=r.pts;}map[r.name]=rank;});
  return map;
}

function renderLeaderboard(){
  const {rows,counted,anyLive}=computeBoard();
  updateStreaks(counted);
  const ranks=rankMap(rows);
  if(counted)store.set("ufa_ranks",ranks);
  const sl=document.getElementById("statusline");
  const t=lastUpdated?lastUpdated.toLocaleTimeString():"";
  if(feedStatus==="ok"){
    sl.innerHTML=`<span class="dot ok"></span><span>${anyLive?"LIVE — ":""}updated ${t} · auto-refreshes every 90s · ${counted}/${MATCHES.length} results</span>`;
  }else if(feedStatus==="manual"){
    sl.innerHTML=`<span class="dot"></span><span>live feed unreachable — showing manual results (${counted}) · retrying automatically</span>`;
  }else if(feedStatus==="error"){
    sl.innerHTML=`<span class="dot err"></span><span>couldn't reach the live results feed — retrying every 90s</span>`;
  }else{
    sl.innerHTML=`<span class="dot"></span><span>connecting to live results…</span>`;
  }
  const lb=document.getElementById("lbbody");
  if(!counted){
    lb.innerHTML=`<p style="font-size:18px;color:var(--muted);padding:10px 2px">No results yet — the table fills in automatically once the first match kicks off.</p>`;
    return;
  }
  const trs=rows.map(r=>{
    const rank=ranks[r.name];
    let mv="";
    if(baselineRanks&&baselineRanks[r.name]){
      const d=baselineRanks[r.name]-rank;
      if(d>0)mv=`<span class="mv up">▲${d}</span>`;
      else if(d<0)mv=`<span class="mv dn">▼${-d}</span>`;
    }
    return `<tr class="${rank<=3?"podium":""}">
      <td class="rank">${rank}${mv}</td>
      <td>${deco(r.name)}${r.perfect?`<span class="tag exact">${r.perfect}× perfect</span>`:""}</td>
      <td class="pts${r.pts?"":" zero"}">${r.pts}${r.livePts?`<span class="lv">+${r.livePts} live</span>`:""}</td>
    </tr>`;
  }).join("");
  lb.innerHTML=`<table><thead><tr><th></th><th>Player</th><th style="text-align:right">Points</th></tr></thead><tbody>${trs}</tbody></table>`;
}

/* ================= TRASH-TALK TICKER ================= */
function buildTicker(){
  const {rows,counted}=computeBoard();
  const H=[];
  const resulted=MATCHES.map(m=>({m,res:resultFor(m)})).filter(x=>x.res);
  if(counted){
    H.push(`👑 <b>${esc(rows[0].name)}</b> leads the pool with ${rows[0].pts} pts`);
    const lastRes=resulted[resulted.length-1];
    PLAYERS.forEach((n,i)=>{
      const pk=lastRes.m.p[i]; if(!pk)return;
      const p=scorePick(pk,lastRes.res);
      if(p===90)H.push(`💥 <b>${esc(n)}</b> drops a PERFECT 90 on ${lastRes.m.h}–${lastRes.m.a}`);
      else if(p===0)H.push(`🧊 <b>${esc(n)}</b> blanks on ${lastRes.m.h}–${lastRes.m.a} — pool shows no mercy`);
    });
    const last=rows[rows.length-1];
    if(last.pts<rows[0].pts)H.push(`🥄 <b>${esc(last.name)}</b> holds the wooden spoon`);
    Object.entries(STREAK).forEach(([n,s])=>{if(s==="🔥")H.push(`🔥 <b>${esc(n)}</b> is heating up`);});
  }
  MATCHES.forEach(m=>{const r=resultFor(m);if(r&&r.live)H.push(`🔴 LIVE NOW: ${m.h} ${r.h}–${r.a} ${m.a}`);});
  pstats.filter(s=>s.missed).forEach(s=>H.push(`🕵️ <b>${esc(s.name)}</b> missed ${s.missed} pick${s.missed>1?"s":""} — investigation ongoing`));
  if(!H.length)H.push(`⚽ 24 players · 72 matches picked · may the best guesser win`);
  const text=H.join(' <span style="color:rgba(242,245,240,.4)">•••</span> ')+' <span style="color:rgba(242,245,240,.4)">•••</span> ';
  const el=document.getElementById("ticker");
  el.innerHTML=text+text; /* duplicated for seamless loop */
  el.style.animationDuration=Math.max(30,H.length*9)+"s";
}

/* ================= MATCHES TAB ================= */
const mdtabsEl=document.getElementById("mdtabs");
const gridEl=document.getElementById("matchgrid");
let currentMD=null;
MDS.forEach(md=>{
  const b=document.createElement("button");
  b.className="mdt"; b.dataset.md=md; b.textContent="Matchday "+md;
  b.addEventListener("click",()=>renderMD(md));
  mdtabsEl.appendChild(b);
});

function renderMD(md,keep){
  currentMD=md;
  document.querySelectorAll(".mdt").forEach(b=>b.classList.toggle("on",+b.dataset.md===md));
  gridEl.innerHTML="";
  let first=-1;
  MATCHES.forEach((m,i)=>{
    if(m.md!==md)return;
    if(first<0)first=i;
    const A=analysis[i], n=A.n, res=resultFor(m);
    const lead=res
      ? `<span class="fin">${res.live?"LIVE":"FT"} ${res.h}–${res.a}</span>`
      : (A.majority.length>1 ? "split pool" : oname(m,A.majority[0])+" "+Math.round(100*A.max/n)+"%");
    const btn=document.createElement("button");
    btn.className="mbtn"; btn.dataset.i=i;
    btn.innerHTML=`<div class="teams">${FLAG[m.h]} ${m.h} – ${m.a} ${FLAG[m.a]}</div>
      <div class="mini">
        <i class="seg-h" style="width:${100*A.counts.H/n}%"></i>
        <i class="seg-d" style="width:${100*A.counts.D/n}%"></i>
        <i class="seg-a" style="width:${100*A.counts.A/n}%"></i>
      </div>
      <div class="lean">${lead}</div>`;
    btn.addEventListener("click",()=>showMatch(i));
    gridEl.appendChild(btn);
  });
  showMatch(keep!=null?keep:first);
}

/* rooting guide for matches that haven't been played yet */
function rootingGuide(m){
  const groups={H:[],D:[],A:[]};
  PLAYERS.forEach((p,pi)=>{const pk=m.p[pi];if(!pk)return;groups[outc(pk[0],pk[1])].push(p);});
  const block=(o,label)=>groups[o].length?`<div class="root"><div class="rh">${label} <span class="plus">+48 for ${groups[o].length}</span></div><div class="names">${groups[o].map(esc).join(", ")}</div></div>`:"";
  return `<div class="seclabel">Rooting guide — who needs what</div>
    <div class="rooting">
      ${block("H","If "+FLAG[m.h]+" "+m.h+" wins")}
      ${block("D","If it's a draw")}
      ${block("A","If "+FLAG[m.a]+" "+m.a+" wins")}
    </div>`;
}

function showMatch(i){
  document.querySelectorAll(".mbtn").forEach(b=>b.classList.toggle("on",+b.dataset.i===i));
  const m=MATCHES[i], A=analysis[i], n=A.n, res=resultFor(m);
  const pct=o=>Math.round(100*A.counts[o]/n);
  const seg=(o,cls,label)=>A.counts[o]?`<div class="${cls}" style="width:${100*A.counts[o]/n}%" title="${label}">${A.counts[o]>=3?label+" "+pct(o)+"%":""}</div>`:"";

  const picked=[],nopick=[];
  PLAYERS.forEach((p,pi)=>{
    const pk=m.p[pi];
    if(!pk){nopick.push(p);return;}
    const [h,a]=pk, k=h+"-"+a;
    picked.push({p,h,a,k,c:A.freq[k],isTop:k===A.topScore[0]&&A.topScore[1]>1,isLone:A.freq[k]===1,
      pts:res?scorePick(pk,res):null});
  });
  picked.sort((x,y)=> res ? (y.pts-x.pts||x.p.localeCompare(y.p)) : (y.c-x.c||x.k.localeCompare(y.k)||x.p.localeCompare(y.p)));
  const rows=picked.map(r=>`<tr><td>${deco(r.p)}${r.isTop?'<span class="tag herd">crowd pick</span>':""}${r.isLone?'<span class="tag lone">lone pick</span>':""}${r.pts===90?'<span class="tag exact">perfect</span>':""}</td>
      <td>${flap(r.h,r.a)}</td><td style="color:var(--muted)">${oname(m,outc(r.h,r.a))}</td>${res?`<td class="pts${r.pts?"":" zero"}">${r.pts}</td>`:""}</tr>`).join("")
    + nopick.map(p=>`<tr><td>${deco(p)}<span class="tag miss">no pick</span></td><td class="nopick">—</td><td></td>${res?'<td class="pts zero">0</td>':""}</tr>`).join("");

  document.getElementById("matchdetail").innerHTML=`
    <div class="mhead"><span class="big">${FLAG[m.h]} ${m.h} <span style="color:var(--muted)">vs</span> ${m.a} ${FLAG[m.a]}</span>
      <span class="mdtag">MD${m.md}</span>
      ${res?(res.live?`<span class="livepill">LIVE ${res.h}–${res.a}</span>`:`<span class="ftpill">FT ${res.h}–${res.a}</span>`):""}
    </div>
    <div class="splitbar">${seg("H","seg-h",m.h)}${seg("D","seg-d","Draw")}${seg("A","seg-a",m.a)}</div>
    <div class="legend">
      <span><b>${A.counts.H}</b> picked ${m.h}</span>
      <span><b>${A.counts.D}</b> picked a draw</span>
      <span><b>${A.counts.A}</b> picked ${m.a}</span>
      ${nopick.length?`<span><b>${nopick.length}</b> no pick</span>`:""}
    </div>
    ${res?"":rootingGuide(m)}
    <div class="seclabel">${res?"Points this match":"Everyone's pick"}</div>
    <table><thead><tr><th>Player</th><th>Pick</th><th>Backing</th>${res?'<th style="text-align:right">Pts</th>':""}</tr></thead><tbody>${rows}</tbody></table>`;
}

/* ================= PLAYERS TAB ================= */
function buildPGrid(){
  const pg=document.getElementById("pgrid");
  const on=document.querySelector(".pbtn.on");
  const keep=on?+on.dataset.i:null;
  pg.innerHTML="";
  PLAYERS.forEach((p,i)=>{
    const b=document.createElement("button");
    b.className="pbtn"+(i===keep?" on":""); b.dataset.i=i;
    b.innerHTML=`<span>${deco(p)}</span><small>${pstats[i].herdPct}% herd</small>`;
    b.addEventListener("click",()=>showPlayer(i));
    pg.appendChild(b);
  });
}

function showPlayer(i){
  document.querySelectorAll(".pbtn").forEach(b=>b.classList.toggle("on",+b.dataset.i===i));
  const s=pstats[i];
  const {rows:board}=computeBoard();
  const mine=board.find(r=>r.i===i);
  const rank=board.findIndex(r=>r.pts===mine.pts)+1;
  const hasAnyResult=MATCHES.some(m=>resultFor(m));
  const rows=MATCHES.map((m,mi)=>{
    const pk=m.p[i], A=analysis[mi], res=resultFor(m);
    const [tk,tc]=A.topScore, [th,ta]=tk.split("-");
    const resCell=res?` <span style="color:var(--live);font-size:14px">${res.live?"LIVE":"FT"} ${res.h}–${res.a}</span>`:"";
    if(!pk)return `<tr><td>${FLAG[m.h]} ${m.h}–${m.a} ${FLAG[m.a]}${resCell}</td>
      <td class="nopick">no pick<span class="tag miss">missed</span></td>
      <td>${flap(th,ta)} <span style="color:var(--muted);font-size:14px">×${tc}</span></td><td></td>${hasAnyResult?(res?'<td class="pts zero">0</td>':"<td></td>"):""}</tr>`;
    const [h,a]=pk, my=outc(h,a), agrees=A.majority.includes(my);
    const p=res?scorePick(pk,res):null;
    return `<tr>
      <td>${FLAG[m.h]} ${m.h}–${m.a} ${FLAG[m.a]}${resCell}</td>
      <td>${flap(h,a)}${A.freq[h+"-"+a]===1?'<span class="tag lone">lone</span>':""}${p===90?'<span class="tag exact">perfect</span>':""}</td>
      <td>${flap(th,ta)} <span style="color:var(--muted);font-size:14px">×${tc}</span></td>
      <td class="${agrees?"agree":"differ"}">${agrees?"with the pool":"against · "+oname(m,my)}</td>
      ${hasAnyResult?(res?`<td class="pts${p?"":" zero"}">${p}</td>`:"<td></td>"):""}</tr>`;
  }).join("");

  document.getElementById("pdetail").innerHTML=`
    <div class="mhead"><span class="big">${deco(s.name)}</span></div>
    <div class="statrow">
      ${hasAnyResult?`<div class="stat"><div class="v">#${rank}</div><div class="k">pool rank</div></div>
      <div class="stat"><div class="v">${mine.pts}</div><div class="k">points</div></div>`:""}
      <div class="stat"><div class="v">${s.herdPct}%</div><div class="k">herd index</div></div>
      <div class="stat"><div class="v">${s.avg.toFixed(1)}</div><div class="k">goals / match</div></div>
      <div class="stat"><div class="v">${s.draws}</div><div class="k">draws picked</div></div>
      <div class="stat"><div class="v">${s.lone}</div><div class="k">lone-wolf picks</div></div>
      ${s.missed?`<div class="stat"><div class="v">${s.missed}</div><div class="k">missed picks</div></div>`:""}
    </div>
    <div class="seclabel">Pick by pick</div>
    <table><thead><tr><th>Match</th><th>Their pick</th><th>Pool favorite</th><th>Outcome call</th>${hasAnyResult?'<th style="text-align:right">Pts</th>':""}</tr></thead>
    <tbody>${rows}</tbody></table>`;
}

/* ================= SUPERLATIVES ================= */
function topBy(fn,dir=1){return [...pstats].sort((a,b)=>dir*(fn(b)-fn(a)))[0];}
const optimist=topBy(s=>s.avg);
const pessimist=topBy(s=>s.avg,-1);
const fence=topBy(s=>s.draws);
const wolf=topBy(s=>s.lone);
const sheep=topBy(s=>s.herdPct);
const maverick=topBy(s=>s.herdPct,-1);

const allFreq={};
MATCHES.forEach(m=>m.p.forEach(pk=>{if(!pk)return;const k=pk[0]+"-"+pk[1];allFreq[k]=(allFreq[k]||0)+1;}));
const [popScore,popCount]=Object.entries(allFreq).sort((a,b)=>b[1]-a[1])[0];

let unanimous={c:-1}, divided={c:99};
MATCHES.forEach((m,i)=>{
  const c=analysis[i].topScore[1];
  if(c>unanimous.c)unanimous={m,c,k:analysis[i].topScore[0]};
  if(c<divided.c)divided={m,c,n:analysis[i].scores.length};
});

let blow={d:-1};
MATCHES.forEach((m,mi)=>m.p.forEach((pk,pi)=>{
  if(!pk)return;
  if(pk[0]+pk[1]>blow.d){blow={d:pk[0]+pk[1],h:pk[0],a:pk[1],m,p:PLAYERS[pi]}}
}));

const cards=[
 ["The Optimist",optimist.name,`${optimist.goals} total goals predicted (${optimist.avg.toFixed(1)} per match). Expects fireworks everywhere.`],
 ["The 0–0 Energy Award",pessimist.name,`Only ${pessimist.avg.toFixed(1)} goals per match predicted. Defense wins championships, apparently.`],
 ["The Fence Sitter",fence.name,`Picked ${fence.draws} draws — nobody commits less.`],
 ["The Lone Wolf",wolf.name,`${wolf.lone} picks that literally no one else made. Bold or unhinged, time will tell.`],
 ["Chief of the Herd",sheep.name,`Agreed with the pool's majority outcome in ${sheep.herdPct}% of matches. Zero surprises here.`],
 ["The Maverick",maverick.name,`Lowest herd index in the pool at ${maverick.herdPct}%. Allergic to consensus.`],
 ["Pool's Favorite Scoreline",popScore.replace("-","–"),`Picked ${popCount} times across all matches. The default answer of this pool.`],
 ["Most Unanimous Match",`${unanimous.m.h} vs ${unanimous.m.a}`,`${unanimous.c} of ${unanimous.m.p.filter(Boolean).length} players landed on the exact same ${unanimous.k.replace("-","–")}.`],
 ["Most Chaotic Match",`${divided.m.h} vs ${divided.m.a}`,`No scoreline got more than ${divided.c} backers — ${divided.n} different scores predicted.`],
 ["Biggest Blowout Called",blow.p,`Went ${blow.h}–${blow.a} in ${blow.m.h} vs ${blow.m.a}. No mercy.`],
];
document.getElementById("supergrid").innerHTML=cards.map(([a,w,y])=>
 `<div class="super"><div class="award">${a}</div><div class="who">${esc(w)}</div><div class="why">${y}</div></div>`).join("");

/* ================= BACKGROUND FLARE ================= */

  const layer=document.querySelector(".flare");

                      :ITEMS[Math.floor(Math.random()*ITEMS.length)];

    o.style.left=(Math.random()*96)+"%";
    o.style.fontSize=(16+Math.random()*26)+"px";

  }
})();

/* ================= REFRESH & BOOT ================= */
function refreshAll(){
  renderLeaderboard();
  buildTicker();
  buildPGrid();
  const curM=document.querySelector(".mbtn.on");
  renderMD(currentMD,curM?+curM.dataset.i:null);
  const curP=document.querySelector(".pbtn.on");
  if(curP)showPlayer(+curP.dataset.i);
}
buildPGrid();
renderMD(MDS[0]);
showPlayer(0);
renderLeaderboard();
buildTicker();
fetchResults();
setInterval(fetchResults,90000);
